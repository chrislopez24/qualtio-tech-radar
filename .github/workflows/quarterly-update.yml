name: Quarterly Tech Radar Update

on:
  schedule:
    - cron: '0 9 1-7 1,4,7,10 1'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    outputs:
      shadow_gate_status: ${{ steps.shadow-status.outputs.gate_status }}
      shadow_gate_pass: ${{ steps.shadow-status.outputs.gate_pass }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
          
      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r scripts/requirements.txt

      - name: Capture baseline snapshot
        run: |
          mkdir -p artifacts
          if [ -f "src/data/data.ai.json" ]; then
            cp src/data/data.ai.json artifacts/baseline.json
            echo "Baseline captured at artifacts/baseline.json"
          else
            echo "No baseline file found in repository snapshot"
          fi
          
      - name: Run data pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SYNTHETIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          .venv/bin/python -u scripts/main.py --resume
          
      - name: Shadow Evaluation - Quality Gate
        id: shadow-eval
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SYNTHETIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ ! -f "artifacts/baseline.json" ]; then
            cp src/data/data.ai.json artifacts/baseline.json
            echo "No baseline snapshot found before ETL; using current output as baseline fallback"
          fi

          # quality metrics: core_overlap, leader_coverage, watchlist_recall, llm_call_reduction
          echo "Running shadow evaluation..."
          .venv/bin/python -u scripts/main.py \
            --shadow-only \
            --shadow-baseline artifacts/baseline.json \
            --shadow-current src/data/data.ai.json \
            --shadow-output artifacts/shadow_eval.json \
            --shadow-threshold-core-overlap 0.85 \
            --shadow-threshold-leader-coverage 0.95 \
            --shadow-threshold-watchlist-recall 0.80 \
            --shadow-threshold-llm-reduction 0.00

      - name: Resolve Shadow Gate Status
        id: shadow-status
        if: always()
        run: |
          if [ -f "artifacts/shadow_eval.json" ]; then
            gate_status=$(python -c "import json;from pathlib import Path;report=json.loads(Path('artifacts/shadow_eval.json').read_text());print(str(report.get('gate_status') or 'fail').strip().lower())")
          else
            gate_status="fail"
          fi

          echo "gate_status=${gate_status}" >> "$GITHUB_OUTPUT"

          if [ "$gate_status" = "pass" ]; then
            echo "gate_pass=true" >> "$GITHUB_OUTPUT"
            echo "Shadow gate PASS - ETL data eligible for commit"
          else
            echo "gate_pass=false" >> "$GITHUB_OUTPUT"
            echo "Shadow gate ${gate_status} - restoring validated data snapshot"
            if [ -f "artifacts/baseline.json" ]; then
              cp artifacts/baseline.json src/data/data.ai.json
            fi
          fi
          
      - name: Upload Shadow Eval Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-eval-report
          path: |
            artifacts/shadow_eval.json
            artifacts/baseline.json
          if-no-files-found: warn
          
      - name: Commit sanitized data
        if: ${{ steps.shadow-status.outputs.gate_pass == 'true' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/data.ai.json src/data/data.ai.history.json
          git diff --staged --quiet || git commit -m "chore: update AI radar data"
          
      - name: Push changes
        run: |
          git push || echo "No new data to push"

  build-and-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
          
      - name: Install dependencies
        run: |
          npm ci
          
      - name: Build static site
        run: |
          npm run build
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
