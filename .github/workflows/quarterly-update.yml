name: Quarterly Tech Radar Update

on:
  schedule:
    - cron: '0 9 1-7 1,4,7,10 1'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    outputs:
      build_ref: ${{ steps.build-ref.outputs.build_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r scripts/requirements.txt

      - name: Run data pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SYNTHETIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}
          SYNTHETIC_API_URL: ${{ secrets.SYNTHETIC_API_URL }}
          SYNTHETIC_MODEL: ${{ secrets.SYNTHETIC_MODEL }}
          PYTHONUNBUFFERED: "1"
        run: |
          .venv/bin/python -u scripts/main.py

      - name: Upload ETL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-artifacts
          path: |
            artifacts/market-snapshot.json
            artifacts/lane-packs.json
            artifacts/editorial-decisions.json
            artifacts/editorial-harmonized.json
            artifacts/data.ai.preview.json
            src/data/data.ai.json
          if-no-files-found: warn

      - name: Generate Radar Review Summary
        if: always()
        run: |
          python - <<'PY' > artifacts/review-summary.md
          import json
          from pathlib import Path

          data_path = Path("src/data/data.ai.json")
          if not data_path.exists():
              raise SystemExit("src/data/data.ai.json not found after ETL run")

          payload = json.loads(data_path.read_text())
          technologies = payload.get("technologies", [])
          watchlist = payload.get("watchlist", [])
          meta = payload.get("meta", {}).get("pipeline", {})

          print("# Radar Review Summary")
          print()
          print(f"- Updated at: {payload.get('updatedAt', 'n/a')}")
          print(f"- Technologies: {len(technologies)}")
          print(f"- Watchlist: {len(watchlist)}")
          print(f"- Collected: {meta.get('collected', 'n/a')}")
          print(f"- Qualified: {meta.get('qualified', 'n/a')}")
          print(f"- Output: {meta.get('output', len(technologies))}")
          print()
          print("## Top technologies")
          for item in technologies[:10]:
              print(f"- {item.get('name', 'unknown')} ({item.get('ring', 'n/a')}, {item.get('quadrant', 'n/a')})")
          print()
          print("## Watchlist")
          if watchlist:
              for item in watchlist[:10]:
                  print(f"- {item.get('name', 'unknown')} ({item.get('ring', 'n/a')}, {item.get('quadrant', 'n/a')})")
          else:
              print("- none")
          PY
          cat artifacts/review-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Radar Review Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-review-summary
          path: artifacts/review-summary.md
          if-no-files-found: warn

      - name: Commit radar data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/data.ai.json
          git diff --staged --quiet || git commit -m "chore: update AI radar data"

      - name: Push changes
        run: |
          git push

      - name: Record build ref
        id: build-ref
        if: always()
        run: |
          echo "build_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-data.outputs.build_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: |
          npm ci

      - name: Build static site
        run: |
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
