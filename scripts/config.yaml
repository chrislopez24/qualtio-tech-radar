sources:
  github_trending:
    enabled: true
    language: all
    time_range: daily
  hackernews:
    enabled: true
    min_points: 10
    days_back: 7
  google_trends:
    enabled: true
    seed_topics:
      - ai
      - devops
      - qa
      - kubernetes
      - rust
      - postgresql

classification:
  model: hf:MiniMaxAI/MiniMax-M2.5
  temperature: 0.2
  json_mode: true

filtering:
  auto_ignore:
    - rimraf
    - chalk
    - ansi-styles
    - debug
    - is-odd
    - is-even
    - left-pad
    - right-pad
    - tiny-invariant
    - clsx
    - cond
    - wrapt
    - prettier
    - eslint
    - prettierrc
    - ts-node
    - "@types/node"
    - "@types/react"
    - "@types/lodash"
    - lodash
    - underscore
    - moment
  include_only: []
  min_confidence: 0.5

output:
  public_file: src/data/data.ai.json

rate_limit:
  requests_per_minute: 30
  max_retries: 3

checkpoint:
  enabled: true
  interval: 100

deep_scan:
  enabled: false
  repos: []

scoring:
  weights:
    github_momentum: 0.30
    github_popularity: 0.25
    hn_heat: 0.20
    google_momentum: 0.25
  thresholds:
    adopt: 75
    trial: 55
    assess: 35
  hysteresis:
    promote_delta: 5
    demote_delta: 5
    cooldown_weeks: 1

history:
  enabled: true
  file: src/data/data.ai.history.json
  max_weeks: 12

distribution_guardrail:
  enabled: true
  max_ring_ratio: 0.6
