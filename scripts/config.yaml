sources:
  github_trending:
    enabled: true
    language: all
    time_range: daily
  hackernews:
    enabled: true
    min_points: 10
    days_back: 7
  google_trends:
    enabled: true
    seed_topics:
      - python
      - javascript
      - react
      - machine learning
      - docker

classification:
  model: gpt-4
  temperature: 0.2
  json_mode: true
  timeout: 30
  max_retries: 3

filtering:
  auto_ignore: []
  include_only: []
  min_confidence: 0.5

output:
  public_file: src/data/data.ai.json
  internal_file: src/data/data.ai.full.json

rate_limit:
  requests_per_minute: 30
  max_retries: 3

checkpoint:
  enabled: true
  interval: 100

deep_scan:
  enabled: false
  repos: []